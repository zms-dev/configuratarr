[package]
name = "configuratarr"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde-saphyr = "0.0.28"
serde_json = "1.0"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "cookies"] }
tokio = { version = "1.38", features = ["rt-multi-thread", "macros"] }
anyhow = "1.0"
regex = "1.10"
colored = "3.1"
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
wiremock = "0.6"
clap-markdown = "0.1.3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[[test]]
name = "common"
path = "tests/common/mod.rs"
