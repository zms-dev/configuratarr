version: 2
updates:
  # Maintain Rust dependencies in Cargo.toml
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    ignore:
      # darling requires syn ^2.0.15 as of 0.23, and core-macros relies on
      # `From<syn::Error> for darling::Error` — which only exists for the syn
      # major darling builds against. A syn 3 bump therefore breaks the build
      # rather than just the lock. Drop this ignore when darling supports syn 3.
      - dependency-name: "syn"
        update-types: ["version-update:semver-major"]

  # Maintain GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
