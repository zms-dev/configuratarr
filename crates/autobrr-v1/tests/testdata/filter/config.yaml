name: 1080p-movies
enabled: true
priority: 10
use_regex: false
resolutions:
  - 1080p
codecs:
  - x265
sources:
  - BluRay
match_release_types:
  - MOVIE
origins:
  - INTERNAL
min_size: 1GB
max_size: 20GB
indexers:
  - identifier: torrentleech
    name: TorrentLeech
actions:
  - name: push-to-qbit
    action_type: QBITTORRENT
    enabled: true
    client_id: ${ref.download_client.qbit-main}
    category: movies
    save_path: /downloads/movies
external:
  - name: size-check
    external_type: WEBHOOK
    enabled: true
    webhook_host: http://localhost:9000/check
    webhook_method: POST
    webhook_expect_status: 200
