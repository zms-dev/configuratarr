name: qbit-main
client_type: QBITTORRENT
enabled: true
host: http://localhost
port: 8080
username: admin
password: ${env.QBIT_PASS}
settings:
  rules:
    enabled: true
    max_active_downloads: 10
    ignore_slow_torrents: true
    ignore_slow_torrents_condition: MAX_DOWNLOAD_SPEED
  basic:
    auth: true
    username: proxyuser
    password: ${env.PROXY_PASS}
